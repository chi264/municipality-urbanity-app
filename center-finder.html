<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#116466">
  <title>中心地座標検索</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Center Finder</p>
        <h1>中心地座標検索</h1>
      </div>
      <a class="secondary" href="./">戻る</a>
    </header>

    <main class="view">
      <section class="detail-section">
        <h2>中心地を調べる</h2>
        <p class="hint">駅名、市役所、繁華街名などを検索して、中心地候補の緯度・経度を確認できます。</p>
        <form class="form-stack" id="finderForm">
          <label><span>検索語</span><input id="queryInput" name="query" placeholder="例：札幌駅 大通 北海道" required></label>
          <label><span>市町村名</span><input id="municipalityInput" name="municipality" placeholder="例：札幌市"></label>
          <button class="primary" type="submit">検索</button>
        </form>
      </section>

      <section class="detail-section">
        <h3>検索結果</h3>
        <div id="results" class="list-stack">
          <div class="empty">検索すると候補が表示されます。</div>
        </div>
      </section>

      <section class="detail-section">
        <h3>JSON反映用</h3>
        <textarea id="jsonOutput" readonly placeholder="候補を選ぶとcenter用JSONが出ます"></textarea>
        <button class="secondary" id="copyButton" type="button">コピー</button>
      </section>

      <section class="detail-section">
        <h3>出典</h3>
        <p class="hint">検索にはOpenStreetMap Nominatimを利用します。大量検索は避け、候補は必ず地図で確認してください。</p>
        <p class="hint">© OpenStreetMap contributors</p>
      </section>
    </main>
  </div>

  <script src="center-finder.js" type="module"></script>
</body>
</html>
